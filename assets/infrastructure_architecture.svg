<svg xmlns="http://www.w3.org/2000/svg" width="860" height="920" viewBox="0 0 860 920">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #4b5563; }
      .label { font: 600 16px Arial, sans-serif; fill: #111827; }
      .small { font: 400 13px Arial, sans-serif; fill: #374151; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 16; ry: 16; }
      .accent { fill: #eef2ff; stroke: #3730a3; stroke-width: 2; rx: 16; ry: 16; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow2); }
      .pill { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 999; ry: 999; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <text x="40" y="42" class="title">Infrastructure Architecture</text>
  <text x="40" y="68" class="subtitle">Systems Engineer Field Guide · operational stack overview</text>
  <rect x="310" y="100" width="380" height="70" class="accent"/>
  <text x="500.0" y="130" text-anchor="middle" class="label">Azure / Cloud Resources</text>
  <text x="500.0" y="154" text-anchor="middle" class="small">resource groups · networking · compute · identity</text>
  <rect x="70" y="230" width="270" height="90" class="box"/>
  <text x="205.0" y="260" text-anchor="middle" class="label">Linux Servers</text>
  <text x="205.0" y="284" text-anchor="middle" class="small">services · logging · patching · hardening</text>
  <rect x="450" y="230" width="270" height="90" class="box"/>
  <text x="585.0" y="260" text-anchor="middle" class="label">Windows Servers</text>
  <text x="585.0" y="284" text-anchor="middle" class="small">services · validation · operations</text>
  <rect x="230" y="380" width="330" height="80" class="accent"/>
  <text x="395.0" y="410" text-anchor="middle" class="label">Terraform / Automation</text>
  <text x="395.0" y="434" text-anchor="middle" class="small">repeatable deployment · change control</text>
  <rect x="230" y="500" width="330" height="80" class="box"/>
  <text x="395.0" y="530" text-anchor="middle" class="label">Hardening &amp; Compliance</text>
  <text x="395.0" y="554" text-anchor="middle" class="small">STIGs · baselines · remediation</text>
  <rect x="230" y="620" width="330" height="80" class="box"/>
  <text x="395.0" y="650" text-anchor="middle" class="label">Monitoring / Logging</text>
  <text x="395.0" y="674" text-anchor="middle" class="small">health checks · evidence · alerts</text>
  <rect x="230" y="740" width="330" height="80" class="accent"/>
  <text x="395.0" y="770" text-anchor="middle" class="label">Vulnerability Remediation</text>
  <text x="395.0" y="794" text-anchor="middle" class="small">findings · validation · closure</text>
  <path d="M500 170 L500 205" class="line"/>
  <path d="M340 275 L395 275" class="thin"/>
  <path d="M610 275 L565 275" class="thin"/>
  <path d="M500 320 L500 375" class="line"/>
  <path d="M395 460 L395 500" class="thin"/>
  <path d="M395 580 L395 620" class="thin"/>
  <path d="M395 700 L395 740" class="thin"/>
  <rect x="40" y="840" width="760" height="46" class="pill"/>
  <text x="420" y="869" text-anchor="middle" class="small">Design intent: discovery → automation → compliance → monitoring → remediation → validated operations</text>
</svg>